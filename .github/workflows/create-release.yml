name: Create GitHub Release

on:
  push:
    tags:
      - 'releases/v*'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: get_version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#releases/v}
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG_NAME, Version: $VERSION"

      - name: Extract notes from tag
        id: get_notes
        run: |
          NOTES_FILE="$(mktemp)"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          git show "${GITHUB_REF}" | sed '/^commit /,$ d;/^-----BEGIN PGP SIGNATURE-----/,$ d;0,/^ *$/ d' > "$NOTES_FILE"
          echo "Extracted release notes to $NOTES_FILE"
          ls -l "$NOTES_FILE"
          cat "$NOTES_FILE"

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.get_version.outputs.tag }}" \
            --notes-file "${{ steps.get_notes.outputs.notes_file }}" \
            --title "v${{ steps.get_version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        continue-on-error: true
        run: |
          # 1427361285888016635 is the Discord role ID to ping on release.
          # To find a role ID: enable Developer Mode in Discord (Settings -> Advanced -> Developer Mode),
          # then right-click the role in Server Settings -> Roles and select "Copy Role ID".
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"content": "<@&1427361285888016635> **Anchor v${{ steps.get_version.outputs.version }}** has been released! https://github.com/KeetaNetwork/anchor/releases/tag/${{ steps.get_version.outputs.tag }}"}'
